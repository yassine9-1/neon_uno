<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON-UNO - Écran Projection</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="particles-container"></div>
    <div class="container">
        <header>
            <h1 class="neon-text">NEON-UNO</h1>
            <div id="connection-info">
                <p>Scanner pour rejoindre !</p>
                <img id="qrcode" src="" alt="QR Code" style="display: none;">
                <p id="server-url">Chargement de l'URL...</p>
            </div>
        </header>

        <main>
            <!-- Jauge des équipes (Tir à la corde) -->
            <div id="team-bar-container"
                style="width: 100%; height: 30px; background: #333; margin-bottom: 20px; border-radius: 15px; overflow: hidden; display: flex; border: 2px solid white; box-shadow: 0 0 10px white;">
                <div id="blue-score"
                    style="width: 50%; background: #3498DB; box-shadow: 0 0 15px #3498DB; transition: width 0.5s;">
                </div>
                <div id="magenta-score"
                    style="width: 50%; background: #F572F7; box-shadow: 0 0 15px #F572F7; transition: width 0.5s;">
                </div>
            </div>

            <!-- Overlay Virus -->
            <div id="virus-overlay"
                style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.4); z-index:100; justify-content:center; align-items:center; flex-direction:column;">
                <h1
                    style="font-size: 6rem; color: white; text-shadow: 0 0 30px red; animation: pulse 0.5s infinite alternate;">
                    ⚠️ VIRUS ⚠️</h1>
                <h2 style="font-size: 3rem; color: white;">Secouez vite vos téléphones !</h2>
            </div>

            <!-- Overlay Fin de partie -->
            <div id="game-over-overlay"
                style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:200; justify-content:center; align-items:center; flex-direction:column;">
                <h1 id="winner-text" style="font-size: 6rem; color: white; text-shadow: 0 0 30px #F1C40F;">VICTOIRE !
                </h1>
                <p style="font-size: 2rem; color: white;">La partie est terminée.</p>
            </div>

            <div id="deck-area">
                <button id="start-btn"
                    style="padding: 15px 30px; font-size: 1.5rem; background: var(--neon-magenta); border: none; color: white; cursor: pointer; border-radius: 10px; margin-right: 50px;">DÉMARRER
                    LA BATAILLE</button>
                <div class="card center-card empty" id="center-card">
                    UNO
                </div>
            </div>

            <div id="players-area">
                <h2>Joueurs Connectés (<span id="player-count">0</span>)</h2>
                <div id="players-list"></div>
            </div>
        </main>
    </div>

    <!-- Client Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const playersList = document.getElementById('players-list');
        const playerCountEl = document.getElementById('player-count');
        let players = {};

        // Fetch Server Info for QR Code
        fetch('/api/server-info')
            .then(res => res.json())
            .then(data => {
                document.getElementById('server-url').innerText = data.url;
                const qrImage = document.getElementById('qrcode');
                qrImage.src = data.qrCode;
                qrImage.style.display = 'block';
            });

        // Socket Events
        socket.on('player_joined', (player) => {
            players[player.id] = player;
            updatePlayersUI();
        });

        socket.on('player_left', (playerId) => {
            delete players[playerId];
            updatePlayersUI();
        });

        function updatePlayersUI() {
            playersList.innerHTML = '';
            const playerIds = Object.keys(players);
            playerCountEl.innerText = playerIds.length;

            playerIds.forEach(id => {
                const p = players[id];
                const avatar = document.createElement('div');
                avatar.className = 'player-avatar neon-box';
                // Couleur d'équipe
                const color = p.team === 'blue' ? '#3498DB' : '#F572F7';
                avatar.style.borderColor = color;
                avatar.style.boxShadow = `0 0 10px ${color}, inset 0 0 5px ${color}`;
                avatar.innerText = p.username;
                playersList.appendChild(avatar);
            });
        }

        // --- Game/Event Logic ---
        const startBtn = document.getElementById('start-btn');
        const centerCard = document.getElementById('center-card');
        const blueScore = document.getElementById('blue-score');
        const magentaScore = document.getElementById('magenta-score');
        const virusOverlay = document.getElementById('virus-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const winnerText = document.getElementById('winner-text');

        startBtn.addEventListener('click', () => {
            socket.emit('start_game');
            startBtn.style.display = 'none';
        });

        socket.on('game_started', (data) => {
            startBtn.style.display = 'none';
            updateCenterCard(data.currentCard);
        });

        socket.on('card_played_success', (data) => {
            updateCenterCard(data.card);

            // Updates Team Tug-of-War scores
            const b = Math.max(0, Math.min(100, data.scores.blue));
            const m = Math.max(0, Math.min(100, data.scores.magenta));
            blueScore.style.width = `${b}%`;
            magentaScore.style.width = `${m}%`;

            // Animation of the main card
            centerCard.classList.remove('animated-play');
            void centerCard.offsetWidth; // Trigger reflow for animation restart
            centerCard.classList.add('animated-play');

            // Visual feedback text
            const cardEl = document.createElement('div');
            if (data.unoOupli) {
                cardEl.innerText = `OBLI DE UNO ! +2 pour ${data.username}`;
                cardEl.style.color = '#E74C3C'; // Red
            } else {
                cardEl.innerText = `${data.username} a joué !`;
            }
            cardEl.className = 'play-feedback neon-text';
            document.body.appendChild(cardEl);
            setTimeout(() => cardEl.remove(), 2000);

            // Generates an explosive particle effect on play
            createExplosion();
        });

        // --- Special Events ---
        socket.on('virus_event', () => {
            virusOverlay.style.display = 'flex';
        });

        socket.on('virus_resolved', (infectedPlayers) => {
            virusOverlay.style.display = 'none';
            if (infectedPlayers.length > 0) {
                const cardEl = document.createElement('div');
                cardEl.innerText = `🦠 Infectés : ${infectedPlayers.join(', ')} (+2 cartes)`;
                cardEl.className = 'play-feedback neon-text';
                cardEl.style.color = '#E74C3C';
                document.body.appendChild(cardEl);
                setTimeout(() => cardEl.remove(), 4000);
            }
        });

        socket.on('game_over', (data) => {
            gameOverOverlay.style.display = 'flex';
            winnerText.innerText = `VICTOIRE DE ${data.winner.toUpperCase()} !`;
            winnerText.style.color = data.team === 'blue' ? '#3498DB' : '#F572F7';
            winnerText.style.textShadow = `0 0 30px ${winnerText.style.color}`;
        });

        // --- Visual Effects ---
        function createParticles() {
            const container = document.getElementById('particles-container');
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 10 + 5 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 5 + 5 + 's';
                p.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 15000);
            }, 600);
        }

        function createExplosion() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 8 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.left = '50vw';
                p.style.bottom = '40vh';
                p.style.animation = `flyFromBottom 1s ease-out`;

                // Randomize trajectory
                const randomX = (Math.random() - 0.5) * 500;
                const randomY = (Math.random() - 0.5) * 500;
                p.style.transform = `translate(${randomX}px, ${randomY}px)`;
                p.style.opacity = '0';
                p.style.transition = 'all 1s';

                container.appendChild(p);

                setTimeout(() => {
                    p.style.opacity = '0.8';
                    p.style.transform = `translate(${randomX * 2}px, ${randomY * 2 - 200}px)`;
                }, 50);

                setTimeout(() => p.remove(), 1000);
            }
        }

        createParticles();

        function updateCenterCard(card) {
            centerCard.classList.remove('empty');
            // Basic color styling for now
            const colorMap = {
                'red': '#E74C3C',
                'blue': '#3498DB',
                'green': '#2ECC71',
                'yellow': '#F1C40F',
                'black': '#333'
            };
            centerCard.style.backgroundColor = colorMap[card.color];
            centerCard.style.borderColor = 'white';
            centerCard.innerText = card.value.toUpperCase();
        }
    </script>
    </script>
</body>

</html>
